services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: flowforge
      POSTGRES_USER: flowforge
      POSTGRES_PASSWORD: flowforge
    volumes: ["postgres_data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowforge"]
      interval: 5s
      timeout: 5s
      retries: 10
  redis:
    image: redis:7-alpine
  backend:
    build: ./backend
    env_file: .env.example
    environment:
      DATABASE_URL: postgresql+psycopg://flowforge:flowforge@postgres:5432/flowforge
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_started }
    ports: ["8000:8000"]
  worker:
    build: ./backend
    command: celery -A app.workers.tasks.celery_app worker --loglevel=INFO
    env_file: .env.example
    depends_on: [backend, redis]
  scheduler:
    build: ./backend
    command: celery -A app.scheduler.beat.celery_app beat --loglevel=INFO
    env_file: .env.example
    depends_on: [backend, redis]
  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000
      NEXT_PUBLIC_BROWSER_API_URL: http://localhost:8000
    depends_on: [backend]
    ports: ["3000:3000"]
  prometheus:
    image: prom/prometheus:v2.55.1
    volumes: ["./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro"]
    ports: ["9090:9090"]
    depends_on: [backend]
  grafana:
    image: grafana/grafana:11.4.0
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: flowforge
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports: ["3001:3000"]
    depends_on: [prometheus]
  nginx:
    image: nginx:1.27-alpine
    volumes: ["./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro"]
    ports: ["8080:80"]
    depends_on: [frontend, backend]
volumes:
  postgres_data:
